# remap prefix to Control + a
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# force a reload of the config file
unbind r
bind r source-file ~/.tmux.conf

# split windows like vim
# vim's definition of a horizontal/vertical split is reversed from tmux's
bind s split-window -v -c "#{pane_current_path}"
bind v split-window -h -c '#{pane_current_path}'

bind ^s split-window -v -c "#{pane_current_path}"
bind ^v split-window -h -c "#{pane_current_path}"

# open panes in same path when using canonical tmux splits
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Provide command to generate a 2:1 ratio layout
bind @ split-window -h -p 33 -c "#{pane_current_path}"

# move around panes with hjkl, as one would in vim after pressing ctrl-w
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind ^h select-pane -L
bind ^j select-pane -D
bind ^k select-pane -U
bind ^l select-pane -R

bind K confirm kill-server
bind X confirm kill-window

# Toggle Nord dark / light theme (also updates Hyper)
bind T run-shell "$HOME/.dotfiles/scripts/theme-toggle.sh"

# avoid lag when pressing `esc` in vim
# https://stackoverflow.com/a/33812578
set -s escape-time 0

# longer scrollback
set -g history-limit 10000

# set a 256color $TERM variable so programs inside tmux know they can use 256 colors
set -g default-terminal screen-256color
# reverted the following until all deployed instances have the lastest terminfo
if-shell 'infocmp tmux-256color >/dev/null 2>&1' \
  "set -g default-terminal tmux-256color" \
  "set -g default-terminal screen-256color"

set -as terminal-overrides ',xterm*:sitm=\E[3m'

# disable mouse mode by default
if-shell "tmux -V | awk '{exit ($2 > 2.0) ? 0 : 1}'" \
  'set -g mouse off'
if-shell "tmux -V | awk '{exit ($2 < 2.1) ? 0 : 1}'" \
  'set -g mode-mouse off ;\
  set -g mouse-resize-pane off ;\
  set -g mouse-select-pane off ;\
  set -g mouse-select-window off'

# Toggle mouse on with m
if-shell "tmux -V | awk '{exit ($2 < 2.1) ? 0 : 1}'" \
  "bind m \
    set -g mode-mouse on \\;\
    set -g mouse-resize-pane on \\;\
    set -g mouse-select-pane on \\;\
    set -g mouse-select-window on \\;\
    display 'Mouse: ON'"

if-shell "tmux -V | awk '{exit ($2 > 2.0) ? 0 : 1}'" \
  "bind m \ set -g mouse on \\;\
    display 'Mouse: ON'"

# Toggle mouse off with M
if-shell "tmux -V | awk '{exit ($2 < 2.1) ? 0 : 1}'" \
  "bind M \
    set -g mode-mouse off \\;\
    set -g mouse-resize-pane off \\;\
    set -g mouse-select-pane off \\;\
    set -g mouse-select-window off \\;\
    display 'Mouse: OFF'"

set -g mouse on

if-shell "tmux -V | awk '{exit ($2 > 2.0) ? 0 : 1}'" \
  "bind M \
    set -g mouse off \\;\
    display 'Mouse: OFF'"

# Use vi keys in copy mode
set-window-option -g mode-keys vi

# Mouse drag: enter copy mode and select
bind-key -n MouseDrag1Pane if -Ft= '#{mouse_any_flag}' \
  'if -Ft= "#{pane_in_mode}" "copy-mode -M" "send-keys -M"' \
  'copy-mode -M'

# Copy to system clipboard when drag ends
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode    MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"


# Create a new window and prompt for name
bind N command-prompt "new-window -n '%%' -c '#{pane_current_path}'"
bind c new-window -c '#{pane_current_path}'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin "nordtheme/tmux"
set -g @plugin 'tmux-plugins/tmux-yank'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# Theme override — must be after TPM so it wins over nordtheme/tmux
if-shell '[ "$(cat ~/.dotfiles/.theme 2>/dev/null)" = "light" ]' \
  'source-file ~/.dotfiles/tmux/nord-light.tmuxtheme' \
  'source-file ~/.dotfiles/tmux/nord-dark.tmuxtheme'


